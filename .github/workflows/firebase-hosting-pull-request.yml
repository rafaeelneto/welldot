name: Deploy to Firebase Hosting on PR
'on': pull_request
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: npm ci && shx cp pdfmake/pdfmake.js node_modules/pdfmake/build/pdfmake.js && shx cp pdfmake/vfs_fonts.js node_modules/pdfmake/build/vfs_fonts.js && npm run build
        env:
          CI: false
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          entrypoint: .
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WELLPROFILER }}'
          projectId: wellprofiler
