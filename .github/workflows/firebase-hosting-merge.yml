name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: cd ./client && npm ci && shx cp pdfmake/pdfmake.js node_modules/pdfmake/build/pdfmake.js && shx cp pdfmake/vfs_fonts.js node_modules/pdfmake/build/vfs_fonts.js && npm run build
        env:
          CI: false
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          entrypoint: ./client
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WELLPROFILER }}'
          channelId: live
          projectId: wellprofiler
