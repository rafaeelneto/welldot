name: well-profiler — Deploy

on:
  push:
    branches:
      - main
      - release
    paths:
      - 'apps/well-profiler/**'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy custom pdfmake build
        run: |
          cp apps/well-profiler/pdfmake/pdfmake.js apps/well-profiler/node_modules/pdfmake/build/pdfmake.js
          cp apps/well-profiler/pdfmake/vfs_fonts.js apps/well-profiler/node_modules/pdfmake/build/vfs_fonts.js

      - name: Build
        run: pnpm turbo build --filter=well-profiler

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WELLPROFILER }}'
          channelId: ${{ github.ref_name == 'main' && 'live' || github.ref_name }}
          projectId: wellprofiler
          entryPoint: apps/well-profiler
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
