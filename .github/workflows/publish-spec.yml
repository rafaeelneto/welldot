name: publish — @welldot/core

on:
  push:
    tags:
      - '@welldot/core@*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build and pack without publishing)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance attestation

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @welldot/core
        run: pnpm turbo build --filter=@welldot/core

      - name: Test @welldot/core
        run: pnpm turbo test --filter=@welldot/core

      - name: Publish to npm
        if: ${{ github.event_name == 'push' || github.event.inputs.dry_run == 'false' }}
        run: pnpm publish --filter=@welldot/core --no-git-checks --access public --provenance

      - name: Dry run (pack only)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        run: pnpm --filter=@welldot/core exec npm pack --dry-run
